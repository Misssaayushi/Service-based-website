<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | C Advertisement</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#800180', primaryLight: '#a302a3' },
                    fontFamily: { sans: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">


    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {document.documentElement.classList.add('dark');} else {document.documentElement.classList.remove('dark');}
    </script>
</head>
<body class="font-sans text-gray-800 dark:text-gray-100 dark:text-gray-200 antialiased bg-gray-50 dark:bg-[#121212] flex flex-col min-h-screen">
    
    <!-- Navigation -->
    <header class="fixed w-full top-0 z-50 bg-white dark:bg-[#121212]/90 backdrop-blur-md shadow-sm border-b border-gray-100 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="flex items-center space-x-2 text-primary dark:text-primaryLighter font-bold text-2xl" aria-label="C Advertisement Home">
                    <img src="assets/Logo/C-ad without tagline.png" alt="C Advertisement Logo" class="h-10 w-auto">
                    <span>C Advertisement</span>
                </a>
                
                <nav class="hidden md:flex space-x-8 items-center">
                    <a href="index.html" class="text-gray-600 dark:text-gray-300 hover:text-primary dark:hover:text-primaryLighter transition-colors">Home</a>
                    <a href="about.html" class="text-primary dark:text-primaryLighter font-semibold transition-colors">About</a>
                    <a href="services.html" class="text-gray-600 dark:text-gray-300 hover:text-primary dark:hover:text-primaryLighter transition-colors">Services</a>
                    <a href="portfolio.html" class="text-gray-600 dark:text-gray-300 hover:text-primary dark:hover:text-primaryLighter transition-colors">Portfolio</a>
                    
                    <button id="theme-toggle-desktop" type="button" class="text-gray-600 dark:text-gray-300 dark:text-gray-400 hover:text-primary dark:hover:text-primaryLighter transition-colors text-2xl mr-6 outline-none focus:outline-none flex items-center justify-center translate-y-0.5" aria-label="Toggle dark mode">
                        <i id="theme-toggle-dark-icon-desktop" class="ph ph-moon hidden"></i>
                        <i id="theme-toggle-light-icon-desktop" class="ph ph-sun hidden"></i>
                    </button>

                    <a href="contact.html" class="px-5 py-2.5 bg-primary text-white font-medium rounded-full shadow-lg shadow-primary/30 hover:bg-primaryLight hover:shadow-xl transition-all">Contact Us</a>
                </nav>
            </div>
        </div>
    </header>
    
    <main class="flex-grow pt-32 pb-24">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h1 class="text-5xl font-bold text-gray-900 dark:text-white mb-6">About <span class="text-primary">Us</span></h1>
            <p class="text-xl text-gray-600 dark:text-gray-300 mb-8">We are C Advertisement, pioneers in creating memorable outdoor advertising experiences. We turn spaces into spectacles.</p>
            <a href="contact.html" class="inline-block px-8 py-4 bg-primary text-white font-semibold rounded-full shadow-xl shadow-primary/30 hover:bg-primaryLight transition-all">Work With Us</a>
        </div>
    </main>
    
    <footer class="bg-gray-900 text-white py-8 text-center mt-auto">
        <p>&copy; <span id="year"></span> C Advertisement. All rights reserved.</p>
    </footer>
    
    <script src="js/main.js"></script>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
