<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | C-Advertisements</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#800180',
                        primaryLight: '#a302a3',
                        primaryLighter: '#d98cd9',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">


    <script>
        if (localStorage.getItem('theme-preference') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="font-sans text-gray-800 dark:text-gray-100 dark:text-gray-200 antialiased bg-gray-50 dark:bg-[#121212] flex flex-col min-h-screen">
    
    <!-- Navigation -->
    <header class="relative w-full z-50 bg-white dark:bg-[#121212]/90 backdrop-blur-md shadow-sm border-b border-gray-100 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="flex items-center space-x-2 text-primary dark:text-primaryLighter font-bold text-2xl" aria-label="C-Advertisements Home">
                    <img src="assets/Logo/C-ad without tagline.png" alt="C-Advertisements Logo" class="h-10 w-auto">
                    <span>C-Advertisements</span>
                </a>
                
                <nav class="hidden md:flex space-x-8 items-center">
                    <a href="index.html" class="text-gray-600 dark:text-gray-300 hover:text-primary dark:hover:text-primaryLighter transition-colors">Home</a>
                    <a href="about.html" class="text-gray-600 dark:text-gray-300 hover:text-primary dark:hover:text-primaryLighter transition-colors">About</a>
                    <a href="services.html" class="text-gray-600 dark:text-gray-300 hover:text-primary dark:hover:text-primaryLighter transition-colors">Services</a>
                    <a href="portfolio.html" class="text-gray-600 dark:text-gray-300 hover:text-primary dark:hover:text-primaryLighter transition-colors">Portfolio</a>
                    
                    <button id="theme-toggle-desktop" type="button" class="text-gray-600 dark:text-gray-300 dark:text-gray-400 hover:text-primary dark:hover:text-primaryLighter transition-colors text-2xl mr-6 outline-none focus:outline-none flex items-center justify-center translate-y-0.5" aria-label="Toggle dark mode">
                        <i id="theme-toggle-dark-icon-desktop" class="ph ph-moon hidden"></i>
                        <i id="theme-toggle-light-icon-desktop" class="ph ph-sun hidden"></i>
                    </button>

                    <a href="contact.html" class="px-5 py-2.5 bg-primary text-white font-medium rounded-full shadow-lg shadow-primary/30 hover:bg-primaryLight hover:shadow-xl transition-all">Contact Us</a>
                </nav>
            </div>
        </div>
    </header>
    
    <main class="flex-grow pt-16 pb-24">
        <div class="max-w-3xl mx-auto px-4 text-center">
            <h1 class="text-5xl font-bold text-gray-900 dark:text-white mb-6">Contact <span class="text-primary">Us</span></h1>
            <p class="text-xl text-gray-600 dark:text-gray-300 mb-12">Ready to kick off a high-impact campaign? Let's talk.</p>
            
            <form method="POST" name="contact" data-netlify="true" netlify class="bg-white dark:bg-[#1e1e1e] p-8 rounded-3xl shadow-md border border-gray-100 dark:border-gray-800 text-left" aria-label="Contact Form">
                <input type="hidden" name="form-name" value="contact">
                <div class="mb-6">
                    <label class="block text-gray-700 dark:text-gray-300 font-medium mb-2" for="name">Your Name</label>
                    <input type="text" id="name" name="name" class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-800 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:focus:border-primary transition-all" placeholder="John Doe" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 dark:text-gray-300 font-medium mb-2" for="email">Your Email</label>
                    <input type="email" id="email" name="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-800 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:focus:border-primary transition-all" placeholder="john@example.com" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 dark:text-gray-300 font-medium mb-2" for="message">Message</label>
                    <textarea id="message" name="message" rows="4" class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-800 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:focus:border-primary transition-all" placeholder="Tell us about your campaign..." required></textarea>
                </div>
                <button type="submit" class="w-full py-4 bg-primary text-white font-bold rounded-xl shadow-lg hover:bg-primaryLight transition-all">Send Message</button>
            </form>
        </div>
    </main>
    
    <footer class="bg-gray-900 text-white py-12 text-center mt-auto">
        <div class="mb-6">
            <a href="mailto:cads24x7@gmail.com" class="text-gray-400 hover:text-primaryLighter transition-colors flex items-center justify-center">
                <i class="ph-fill ph-envelope-simple mr-2 text-lg"></i>
                <span>cads24x7@gmail.com</span>
            </a>
        </div>
        <p class="text-gray-500 text-sm">&copy; <span id="year"></span> C-Advertisements. All rights reserved.</p>
    </footer>
    
    <script src="js/main.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            
            fetch("/", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams(formData).toString(),
            })
            .then(() => {
                form.innerHTML = `
                    <div class="text-center py-12 animate-in fade-in zoom-in duration-500">
                        <div class="inline-flex items-center justify-center w-20 h-20 bg-primary/10 rounded-full mb-6">
                            <i class="ph-fill ph-check-circle text-5xl text-primary"></i>
                        </div>
                        <h2 class="text-3xl font-bold text-gray-900 dark:text-white mb-3">Thank you!</h2>
                        <p class="text-lg text-gray-600 dark:text-gray-400">Your message has been sent successfully. We will get back to you shortly.</p>
                    </div>
                `;
            })
            .catch((error) => {
                console.error('Submission error:', error);
                alert('Oops! There was a problem submitting your form. Please try again.');
            });
        });
    </script>
<nav class="md:hidden fixed bottom-6 left-4 right-4 z-50 bg-white/95 dark:bg-[#121212]/95 border border-gray-200 dark:border-gray-800 rounded-full shadow-[0_8px_32px_rgba(0,0,0,0.5)] flex justify-around items-center px-2 py-3 backdrop-blur-md bg-opacity-95">
        <a href="index.html" class="flex flex-col items-center justify-center w-14 transition-colors text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-gray-200">
            <i class="ph ph-house text-2xl mb-1"></i>
            <span class="text-[10px] font-medium tracking-wide">Home</span>
        </a>
        <a href="about.html" class="flex flex-col items-center justify-center w-14 transition-colors text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-gray-200">
            <i class="ph ph-info text-2xl mb-1"></i>
            <span class="text-[10px] font-medium tracking-wide">About</span>
        </a>
        <a href="services.html" class="flex flex-col items-center justify-center w-14 transition-colors text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-gray-200">
            <i class="ph ph-sparkle text-2xl mb-1"></i>
            <span class="text-[10px] font-medium tracking-wide">Services</span>
        </a>
        <a href="portfolio.html" class="flex flex-col items-center justify-center w-14 transition-colors text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-gray-200">
            <i class="ph ph-image text-2xl mb-1"></i>
            <span class="text-[10px] font-medium tracking-wide">Portfolio</span>
        </a>
        <a href="contact.html" class="flex flex-col items-center justify-center w-14 transition-colors text-primary dark:text-primaryLighter">
            <i class="ph-fill ph-envelope-simple text-2xl mb-1"></i>
            <span class="text-[10px] font-medium tracking-wide">Contact</span>
        </a>
    </nav>
</body>
</html>
